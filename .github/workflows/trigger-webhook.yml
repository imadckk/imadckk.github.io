name: Webhook Trigger

on:
  repository_dispatch:
    types: [refresh-attendance]

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger main scraper workflow
        run: |
          curl -L \
            -X POST \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Authorization: token ${{ secrets.G_TOKEN }}" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/scrape-attendance.yml/dispatches \
            -d '{"ref":"main"}'
