name: Scrape Driving School Attendance

on:
  schedule:
    - cron: "0 8,13,18 * * *"
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install Chrome and ChromeDriver
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser chromium-chromedriver
          echo "CHROME_PATH=/usr/bin/chromium-browser" >> $GITHUB_ENV
          echo "CHROMEDRIVER_PATH=/usr/bin/chromedriver" >> $GITHUB_ENV
      
      - name: Install Python dependencies
        run: |
          pip install selenium
          pip install beautifulsoup4
          pip install webdriver-manager
      
      - name: Run attendance scraper
        env:
          COMPANY_USERNAME: ${{ secrets.COMPANY_USERNAME }}
          COMPANY_PASSWORD: ${{ secrets.COMPANY_PASSWORD }}
        run: python scraper.py
      
      - name: Commit and push changes
        if: success()
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add attendance.json
          git diff --staged --quiet || git commit -m "Auto-update attendance data [skip ci]"
          git push
