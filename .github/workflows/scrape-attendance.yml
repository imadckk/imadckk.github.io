name: Scrape data

on:
  schedule:
    - cron: "0 8,13,18 * * *"
  workflow_dispatch:
  push:
    branches: [ main, master ]
    paths:
      - 'scraper.py'

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install requests
          pip install beautifulsoup4
          pip install lxml
      
      - name: Run attendance scraper
        env:
          COMPANY_USERNAME: ${{ secrets.COMPANY_USERNAME }}
          COMPANY_PASSWORD: ${{ secrets.COMPANY_PASSWORD }}
        run: python scraper.py
      
      - name: Upload debug files (if login fails)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-files
          path: |
            debug_*.html
            attendance.json
      
      - name: Commit and push changes
        if: success()
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add attendance.json
          git diff --staged --quiet || git commit -m "Auto-update attendance data [skip ci]"
          git push
